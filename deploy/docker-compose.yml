services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: poopedex
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: poopedex
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U poopedex -d poopedex"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  api-migrate:
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    image: poopedex-api:latest
    pull_policy: build
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://poopedex:${POSTGRES_PASSWORD}@db:5432/poopedex
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
    command: ["pnpm", "--filter", "@poopedex/api", "db:migrate"]

  api:
    image: poopedex-api:latest
    container_name: poopedex-api
    build:
      context: ..
      dockerfile: deploy/api.Dockerfile
    pull_policy: build
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      api-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://poopedex:${POSTGRES_PASSWORD}@db:5432/poopedex
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "3000"
    networks:
      - default
      - edge

  web-build:
    build:
      context: ..
      dockerfile: deploy/web.Dockerfile
      args:
        VITE_API_URL: https://api.${DOMAIN}
    restart: "no"
    volumes:
      - web_dist:/out
    command: ["sh", "-c", "rm -rf /out/* && cp -r /app/web/dist/. /out/ && echo 'web dist published'"]

  # Sert le SPA en interne sur le réseau "edge".
  # Le Caddy frontal (autre compose) reverse-proxy poopedex-web:80.
  web:
    image: caddy:2-alpine
    container_name: poopedex-web
    restart: unless-stopped
    volumes:
      - ./web.Caddyfile:/etc/caddy/Caddyfile:ro
      - web_dist:/srv/web:ro
    networks:
      - edge

volumes:
  db_data:
  web_dist:

networks:
  edge:
    external: true
